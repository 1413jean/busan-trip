<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釜山旅遊筆記 — Busan Travel Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFFFFF;
  --grid: #F9F9F8;
  --text: #37352F;
  --text-mid: #787774;
  --text-light: #B4B4B0;
  --accent: #2383E2;
  --accent-light: #E8F0FE;
  --border: #E9E9E7;
  --hover: #F7F6F3;
  --card: #FFFFFF;
  --tag-red: #FFE2DD; --tag-red-t: #93423A;
  --tag-blue: #D3E5EF; --tag-blue-t: #24548E;
  --tag-green: #DBEDDB; --tag-green-t: #2E6B4F;
  --tag-yellow: #FDECC8; --tag-yellow-t: #89632A;
  --tag-purple: #E8DEEE; --tag-purple-t: #6940A5;
  --tag-pink: #F5E0E9; --tag-pink-t: #93416C;
  --tag-gray: #E3E2E0; --tag-gray-t: #787774;
  --callout-tip: #DBEDDB;
  --callout-warn: #FDECC8;
  --callout-imp: #FFE2DD;
  --sidebar-w: 240px;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter','Noto Sans TC','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.7;
  overflow:hidden;
  height:100vh;
  /* Grid background */
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 24px 24px;
  background-position: -1px -1px;
}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* Material Symbols config */
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  vertical-align: middle;
  line-height: 1;
}
.icon-fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

/* ===== LAYOUT ===== */
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(12px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;
  padding:16px 0;scrollbar-width:thin;
  z-index:10;
}
.sidebar-logo{padding:4px 16px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sidebar-logo h2{font-size:15px;color:var(--text);font-weight:600;display:flex;align-items:center;gap:6px}
.sidebar-logo small{font-size:13px;color:var(--text-light);display:block;margin-top:2px}
.sidebar-nav{padding:4px 8px}
.nav-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;border-radius:6px;cursor:pointer;
  transition:background .15s;position:relative;
  margin-bottom:1px;user-select:none;font-size:15px;color:var(--text-mid);
}
.nav-item:hover{background:var(--hover)}
.nav-item.active{background:var(--accent-light);color:var(--accent)}
.nav-icon{
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;color:inherit;
}
.nav-icon .material-symbols-outlined{font-size:18px}
.nav-label{font-size:14px;color:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item.active .nav-label{font-weight:600}
/* Chapter numbering dots */
.nav-sect{padding:8px 14px 4px;font-size:12px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

/* Main area */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;background:transparent}

/* Mobile tabs */
.mobile-tabs{
  background:rgba(255,255,255,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:8px 12px 6px;overflow-x:auto;white-space:nowrap;
  display:none;-webkit-overflow-scrolling:touch;
}
.tab-item{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 12px;border-radius:6px;margin-right:4px;cursor:pointer;
  background:transparent;color:var(--text-mid);font-size:13px;
  transition:all .15s;flex-shrink:0;border:none;font-family:inherit;
}
.tab-item:hover{background:var(--hover)}
.tab-item.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.tab-item .material-symbols-outlined{font-size:16px}

/* Page header */
.page-header{
  padding:28px 40px 0;
  background:transparent;
  transition:opacity .22s,transform .22s;
  display:flex;flex-direction:column;align-items:center;
}
.page-header-inner{max-width:720px;width:100%}
.page-header h1{font-size:28px;color:var(--text);font-weight:700;letter-spacing:-.3px}
.page-header .sub{font-size:14px;color:var(--text-light);margin-top:2px}
.page-header .breadcrumb{font-size:12px;color:var(--text-light);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.page-header .breadcrumb .material-symbols-outlined{font-size:14px}

/* Content */
.page-content{flex:1;overflow-y:auto;padding:16px 40px 100px;transition:opacity .22s,transform .22s;display:flex;justify-content:center}
.page-inner{max-width:720px;width:100%}

/* Bottom nav */
.bottom-nav{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 40px;
  background:rgba(255,255,255,.9);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
}
.btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 14px;border-radius:6px;border:1px solid var(--border);
  font-weight:500;font-size:13px;cursor:pointer;
  transition:all .15s;font-family:inherit;
  background:var(--bg);color:var(--text);
}
.btn:hover{background:var(--hover)}
.btn:disabled{opacity:.3;cursor:default}
.btn:disabled:hover{background:var(--bg)}
.btn .material-symbols-outlined{font-size:16px}
.btn-next{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-next:hover{background:#1B6EC2}
.btn-next:disabled{background:#E3E2E0;border-color:#E3E2E0;color:#fff}
.btn-start{
  padding:10px 28px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;cursor:pointer;
  font-weight:600;font-size:14px;font-family:inherit;
  transition:all .15s;display:inline-flex;align-items:center;gap:6px;
}
.btn-start:hover{background:#1B6EC2}
.btn-start .material-symbols-outlined{font-size:18px}
.page-num{font-size:12px;color:var(--text-light);font-family:var(--mono)}

/* ===== COMPONENTS ===== */
.fi{opacity:0;transform:translateY(14px);transition:opacity .45s ease,transform .45s ease}
.fi.show{opacity:1;transform:translateY(0)}

/* Photo card */
.photo-card{border-radius:8px;overflow:hidden;background:var(--card);border:1px solid var(--border);margin-bottom:16px}
.photo-card img{width:100%;height:220px;object-fit:cover;display:block}
.photo-card .body{padding:12px 16px}
.photo-card .body p{font-size:14px;color:var(--text);line-height:1.6}
.photo-card .map-link{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:13px;color:var(--accent);font-weight:500}
.photo-card .map-link .material-symbols-outlined{font-size:16px}

/* Step */
.step{display:flex;gap:14px;margin-bottom:18px;align-items:flex-start}
.step-num{
  min-width:28px;height:28px;border-radius:6px;
  background:var(--accent-light);color:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;flex-shrink:0;
  font-family:var(--mono);
}
.step h4{font-weight:600;font-size:15px;color:var(--text);margin-bottom:2px}
.step .kr{font-size:12px;color:var(--text-light);font-family:'Noto Sans KR',sans-serif}
.step .desc{font-size:14px;color:var(--text-mid);line-height:1.8}

/* Callout (info box) */
.callout{
  border-radius:6px;padding:14px 16px;margin:14px 0;
  font-size:14px;line-height:1.8;color:var(--text);
  display:flex;gap:10px;align-items:flex-start;
}
.callout.tip{background:var(--callout-tip)}
.callout.warn{background:var(--callout-warn)}
.callout.important{background:var(--callout-imp)}
.callout-icon{flex-shrink:0;margin-top:2px}
.callout-icon .material-symbols-outlined{font-size:20px}
.callout .title{font-weight:600;margin-bottom:2px}

/* Korean note */
.kr-note{
  background:#F7F6F3;border-radius:6px;padding:10px 14px;margin:10px 0;
  font-size:13px;color:var(--text-mid);
  display:flex;align-items:flex-start;gap:8px;
  border-left:3px solid var(--accent);
}
.kr-note .material-symbols-outlined{font-size:16px;color:var(--accent);flex-shrink:0;margin-top:2px}

/* Table */
.tbl-wrap{overflow-x:auto;margin:14px 0}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{
  background:#F7F6F3;color:var(--text);padding:8px 12px;
  text-align:left;font-weight:600;border-bottom:1px solid var(--border);
  font-size:12px;text-transform:uppercase;letter-spacing:.3px;
}
.tbl td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top;color:var(--text);line-height:1.6}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.hl td{background:var(--callout-warn)}

/* Timeline slot */
.ts{
  display:flex;gap:12px;margin-bottom:10px;
  background:var(--card);border-radius:8px;padding:12px;
  border:1px solid var(--border);overflow:hidden;
  transition:border-color .15s;
}
.ts:hover{border-color:var(--accent)}
.ts img{width:72px;height:72px;object-fit:cover;border-radius:6px;flex-shrink:0}
.ts .time{font-size:12px;font-weight:600;color:var(--accent);font-family:var(--mono)}
.ts h5{font-size:14px;font-weight:600;color:var(--text);margin:1px 0}
.ts .tkr{font-size:12px;color:var(--text-light)}
.ts .tdesc{font-size:13px;color:var(--text-mid);margin-top:2px;line-height:1.6}
.ts .map-link{font-size:12px;color:var(--accent);font-weight:500;margin-top:4px;display:inline-flex;align-items:center;gap:2px}
.ts .map-link .material-symbols-outlined{font-size:14px}

/* Day header */
.day-hdr{
  display:flex;align-items:center;gap:10px;
  margin:0 0 16px;padding:12px 16px;border-radius:8px;
  font-weight:600;font-size:14px;
  border:1px solid var(--border);background:var(--card);
}
.day-hdr .material-symbols-outlined{font-size:22px}

/* Checklist */
.ck{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;background:transparent;border-radius:4px;
  margin-bottom:2px;cursor:pointer;transition:background .15s;
  user-select:none;
}
.ck:hover{background:var(--hover)}
.ck.done{opacity:.5}
.ck-box{
  width:18px;height:18px;border-radius:4px;
  border:1.5px solid var(--text-light);
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.ck.done .ck-box{border-color:var(--accent);background:var(--accent)}
.ck-box .material-symbols-outlined{font-size:14px;color:#fff;display:none}
.ck.done .ck-box .material-symbols-outlined{display:block}
.ck span{font-size:14px;color:var(--text);transition:all .15s;line-height:1.5}
.ck.done span{text-decoration:line-through;color:var(--text-light)}

/* Accordion / Toggle */
.acc{border-bottom:1px solid var(--border);overflow:hidden}
.acc-hdr{
  padding:10px 0;font-weight:500;cursor:pointer;color:var(--text);
  display:flex;align-items:center;gap:4px;user-select:none;font-size:14px;
}
.acc-arrow{transition:transform .2s;color:var(--text-light)}
.acc-arrow .material-symbols-outlined{font-size:18px}
.acc.open .acc-arrow{transform:rotate(90deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.acc.open .acc-body{max-height:600px}
.acc-body-inner{padding:0 0 14px 22px;font-size:14px;color:var(--text-mid);line-height:1.8}

/* Tags / badges */
.tag{
  display:inline-flex;align-items:center;gap:4px;
  border-radius:4px;padding:2px 8px;font-size:12px;
  font-weight:500;margin:2px;
}
.tag-blue{background:var(--tag-blue);color:var(--tag-blue-t)}
.tag-green{background:var(--tag-green);color:var(--tag-green-t)}
.tag-red{background:var(--tag-red);color:var(--tag-red-t)}
.tag-yellow{background:var(--tag-yellow);color:var(--tag-yellow-t)}
.tag-purple{background:var(--tag-purple);color:var(--tag-purple-t)}
.tag-gray{background:var(--tag-gray);color:var(--tag-gray-t)}

/* Divider */
.divider{border-top:1px solid var(--border);margin:20px 0}

/* Grid layout */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-card{background:#F7F6F3;border-radius:8px;padding:14px;border:1px solid var(--border)}
.grid-card strong{font-size:14px;color:var(--text);display:flex;align-items:center;gap:4px}
.grid-card .gdesc{font-size:13px;color:var(--text-mid);white-space:pre-line;margin-top:4px}
.grid-card .gkr{font-size:12px;color:var(--text-light);margin-top:4px}

/* Section heading inside page */
.sec-hdr{
  display:flex;align-items:center;gap:6px;
  font-size:15px;font-weight:600;color:var(--text);
  margin:20px 0 10px;
}
.sec-hdr .material-symbols-outlined{font-size:20px;color:var(--accent)}

/* Paragraph */
.p-text{font-size:14.5px;color:var(--text);line-height:1.85;margin:8px 0}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none!important}
  .mobile-tabs{display:block!important}
  .page-header{padding:16px 20px 0}
  .page-content{padding:12px 20px 100px}
  .bottom-nav{padding:10px 16px}
  .grid-2{grid-template-columns:1fr}
  .ts img{width:60px;height:60px}
}
</style>
</head>
<body>

<div class="app">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="mobile-tabs" id="mobileTabs"></div>
    <div class="page-header" id="pageHeader"></div>
    <div class="page-content" id="pageContent"><div class="page-inner" id="pageInner"></div></div>
    <div class="bottom-nav" id="bottomNav"></div>
  </div>
</div>

<script>
// ============================================================
// DATA — chapters with Material Symbols icon names
// ============================================================
const CH = [
  {id:"cover",label:"封面",icon:"flight_takeoff",title:"釜山旅遊筆記",sub:"부산 여행 노트 — Busan Travel Notes"},
  {id:"prep",label:"行前準備",icon:"checklist",title:"行前準備",sub:"출발 전 준비 — Pre-trip Preparation",sect:"準備篇"},
  {id:"pack",label:"打包行李",icon:"luggage",title:"打包行李",sub:"짐 싸기 — Packing"},
  {id:"airport",label:"桃園機場",icon:"connecting_airports",title:"出發！桃園機場",sub:"타오위안 공항 — Taoyuan Airport"},
  {id:"flight",label:"星宇航空",icon:"airlines",title:"星宇航空飛行中",sub:"스타럭스 항공 — Starlux Airlines"},
  {id:"arrive",label:"抵達釜山",icon:"flight_land",title:"抵達金海機場",sub:"김해공항 도착 — Arrival",sect:"到達篇"},
  {id:"transport",label:"交通方式",icon:"directions_subway",title:"前往廣安里",sub:"광안리로 이동 — Getting There"},
  {id:"rental",label:"租車指南",icon:"directions_car",title:"如果想租車",sub:"렌터카 이용 — Car Rental"},
  {id:"checkin",label:"入住旅館",icon:"hotel",title:"入住 ONUJI STAY",sub:"온유지스테이 체크인 — Check-in"},
  {id:"day1",label:"Day 1",icon:"wb_twilight",title:"Day 1 — 廣安里初體驗",sub:"첫째 날: 광안리 — Gwangalli",sect:"行程篇"},
  {id:"day2",label:"Day 2",icon:"palette",title:"Day 2 — 甘川·南浦洞",sub:"둘째 날: 감천·남포동"},
  {id:"day3",label:"Day 3",icon:"landscape",title:"Day 3 — 松島·西面",sub:"셋째 날: 송도·서면"},
  {id:"day4",label:"Day 4",icon:"surfing",title:"Day 4 — 海雲台·回家",sub:"넷째 날: 해운대·귀국"},
  {id:"tips",label:"實用資訊",icon:"lightbulb",title:"實用小錦囊",sub:"꿀팁 모음 — Tips & Tricks",sect:"附錄"},
  {id:"checklist",label:"行前清單",icon:"task_alt",title:"出發前最後確認",sub:"마지막 체크리스트 — Final Checklist"},
];

let cur = 0;

// ============================================================
// HELPERS
// ============================================================
const mi = (name, cls='') => `<span class="material-symbols-outlined ${cls}">${name}</span>`;

function fi(html, delay=0) {
  return `<div class="fi" style="transition-delay:${delay}ms">${html}</div>`;
}
function photoCard(src,alt,cap,map,d=0) {
  return fi(`<div class="photo-card"><img src="${src}" alt="${alt}" loading="lazy"><div class="body"><p>${cap}</p>${map?`<a class="map-link" href="${map}" target="_blank" rel="noopener">${mi('location_on')} Google Maps</a>`:''}</div></div>`,d);
}
function step(n,title,kr,desc,d=0) {
  return fi(`<div class="step"><div class="step-num">${n}</div><div><h4>${title}</h4>${kr?`<div class="kr">${kr}</div>`:''}
  <div class="desc">${desc}</div></div></div>`,d);
}
function callout(type,title,body,d=0) {
  const icons = {tip:'eco',warn:'warning',important:'error'};
  return fi(`<div class="callout ${type}"><div class="callout-icon">${mi(icons[type]||'info')}</div><div><div class="title">${title}</div>${body}</div></div>`,d);
}
function krNote(text,d=0) {
  return fi(`<div class="kr-note">${mi('translate')} ${text}</div>`,d);
}
function tbl(headers,rows,hlRow=-1,d=0) {
  let h = headers.map(x=>`<th>${x}</th>`).join('');
  let r = rows.map((row,ri)=>`<tr${ri===hlRow?' class="hl"':''}>${row.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');
  return fi(`<div class="tbl-wrap"><table class="tbl"><thead><tr>${h}</tr></thead><tbody>${r}</tbody></table></div>`,d);
}
function ts(time,title,desc,kr,map,img,d=0) {
  return fi(`<div class="ts">${img?`<img src="${img}" alt="${title}" loading="lazy">`:''}<div style="flex:1;min-width:0"><div class="time">${time}</div><h5>${title}</h5>${kr?`<div class="tkr">${kr}</div>`:''}${desc?`<div class="tdesc">${desc}</div>`:''}${map?`<a class="map-link" href="${map}" target="_blank" rel="noopener">${mi('location_on')} 地圖</a>`:''}</div></div>`,d);
}
function ck(text,d=0) {
  return fi(`<div class="ck" onclick="this.classList.toggle('done')"><div class="ck-box">${mi('check')}</div><span>${text}</span></div>`,d);
}
function divider(){ return '<div class="divider"></div>'; }
function P(text,d=0){ return fi(`<p class="p-text">${text}</p>`,d); }
function secHdr(icon,text,d=0) {
  return fi(`<div class="sec-hdr">${mi(icon)} ${text}</div>`,d);
}
function dayHdr(icon,text,color) {
  return fi(`<div class="day-hdr" style="border-left:4px solid ${color}">${mi(icon)} ${text}</div>`,0);
}
function acc(q,a,d=0) {
  return fi(`<div class="acc" onclick="this.classList.toggle('open')"><div class="acc-hdr"><span class="acc-arrow">${mi('chevron_right')}</span><span>${q}</span></div><div class="acc-body"><div class="acc-body-inner">${a}</div></div></div>`,d);
}
function tag(text,color='blue') {
  return `<span class="tag tag-${color}">${text}</span>`;
}

// ============================================================
// PAGE CONTENT
// ============================================================
const PAGES = {};

PAGES.cover = ()=>`
<div style="text-align:center;padding-top:48px">
  ${fi(`<div style="font-size:48px;color:var(--accent);margin-bottom:16px">${mi('flight_takeoff','icon-fill')}</div>`,0)}
  ${fi('<h1 style="font-size:36px;color:var(--text);font-weight:700;letter-spacing:-.5px">釜山旅遊筆記</h1>',150)}
  ${fi('<div style="font-size:15px;color:var(--text-light);margin-top:4px;font-family:var(--mono)">Busan Travel Notes — 부산 여행 노트</div>',250)}
  ${fi(`<div style="margin:28px auto;max-width:440px;border-radius:8px;overflow:hidden;border:1px solid var(--border)">

// ============================================================
// RENDER ENGINE
// ============================================================
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let navHTML = '';
  let lastSect = '';
  CH.forEach((c,i)=>{
    if(c.sect && c.sect !== lastSect) {
      navHTML += `<div class="nav-sect">${c.sect}</div>`;
      lastSect = c.sect;
    }
    navHTML += `<div class="nav-item${i===cur?' active':''}" data-i="${i}">
      <div class="nav-icon">${mi(c.icon)}</div>
      <span class="nav-label">${c.label}</span>
    </div>`;
  });
  sb.innerHTML = `<div class="sidebar-logo"><h2>${mi('flight_takeoff')} 釜山旅遊筆記</h2><small>Busan Travel Notes</small></div>
  <div class="sidebar-nav">${navHTML}</div>`;
  sb.querySelectorAll('.nav-item').forEach(el=>el.addEventListener('click',()=>goTo(+el.dataset.i)));
}

function buildMobileTabs() {
  const mt = document.getElementById('mobileTabs');
  mt.innerHTML = CH.map((c,i)=>`<button class="tab-item${i===cur?' active':''}" data-i="${i}">${mi(c.icon)} ${c.label}</button>`).join('');
  mt.querySelectorAll('.tab-item').forEach(el=>el.addEventListener('click',()=>goTo(+el.dataset.i)));
  const active = mt.querySelector('.tab-item.active');
  if(active) active.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function buildHeader() {
  const ch = CH[cur];
  const hdr = document.getElementById('pageHeader');
  if(ch.id==='cover'){hdr.innerHTML='';return;}
  hdr.innerHTML = `<div class="page-header-inner"><div class="breadcrumb">${mi('flight_takeoff')} 釜山旅遊筆記 / ${ch.label}</div><h1>${ch.title}</h1><div class="sub">${ch.sub}</div></div>`;
}

function buildContent() {
  const ch = CH[cur];
  const inner = document.getElementById('pageInner');
  inner.innerHTML = PAGES[ch.id]();
  requestAnimationFrame(()=>{
    inner.querySelectorAll('.fi').forEach(el=>{
      const d = parseInt(el.style.transitionDelay)||0;
      setTimeout(()=>el.classList.add('show'), 20+d);
    });
  });
  document.getElementById('pageContent').scrollTop = 0;
}

function buildBottomNav() {
  const nav = document.getElementById('bottomNav');
  const ch = CH[cur];
  if(ch.id==='cover'){
    nav.innerHTML = `<div style="display:flex;justify-content:center;width:100%"><button class="btn-start" id="btnStart">${mi('arrow_forward')} 開始閱讀</button></div>`;
    document.getElementById('btnStart').addEventListener('click',()=>goTo(1));
  } else {
    nav.innerHTML = `
      <button class="btn" id="btnPrev" ${cur===0?'disabled':''}>${mi('arrow_back')} 上一步</button>
      <span class="page-num">${cur} / ${CH.length-1}</span>
      <button class="btn btn-next" id="btnNext" ${cur===CH.length-1?'disabled':''}>下一步 ${mi('arrow_forward')}</button>`;
    document.getElementById('btnPrev').addEventListener('click',()=>goTo(cur-1));
    document.getElementById('btnNext').addEventListener('click',()=>goTo(cur+1));
  }
}

function render() {
  buildSidebar();
  buildMobileTabs();
  buildHeader();
  buildContent();
  buildBottomNav();
}

function goTo(idx) {
  if(idx<0||idx>=CH.length||idx===cur) return;
  const hdr = document.getElementById('pageHeader');
  const content = document.getElementById('pageContent');
  hdr.style.opacity = '0';
  content.style.opacity = '0';
  content.style.transform = 'translateY(8px)';
  setTimeout(()=>{
    cur = idx;
    render();
    hdr.style.transition = 'none';
    content.style.transition = 'none';
    content.style.transform = 'translateY(8px)';
    requestAnimationFrame(()=>{
      hdr.style.transition = '';
      content.style.transition = '';
      hdr.style.opacity = '1';
      content.style.opacity = '1';
      content.style.transform = 'translateY(0)';
    });
  }, 200);
}

// Keyboard navigation
document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') goTo(cur+1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') goTo(cur-1);
});

// Init
render();
</script>
